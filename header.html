<style>
/* ===== GHL DEFAULT OVERRIDE — REQUIRED ===== */
html,body{background-color:#07070B!important;color:#EDE9E0!important}
.hl_page-creator--content{background-color:#07070B!important}
[id^="section"],[class*="hl_"]{background-color:#07070B!important;color:#EDE9E0!important}
.hl_page-creator--content p,.hl_page-creator--content span,.hl_page-creator--content h1,.hl_page-creator--content h2,.hl_page-creator--content h3,.hl_page-creator--content h4,.hl_page-creator--content a,.hl_page-creator--content li{color:inherit!important}
.hl_page-creator--content>div,#preview-container,#preview-container>div,[class*="section"],[class*="container"],[class*="wrapper"],[class*="content"]{background-color:transparent!important}
/* ===== END GHL OVERRIDE ===== */

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ===== @PROPERTY ===== */
@property --circle-reveal{syntax:"<percentage>";inherits:false;initial-value:0%}
@property --bar-wax{syntax:"<percentage>";inherits:false;initial-value:0%}
@property --bar-seal{syntax:"<percentage>";inherits:false;initial-value:0%}
@property --bar-ceramic{syntax:"<percentage>";inherits:false;initial-value:0%}
@property --shimmer-x{syntax:"<percentage>";inherits:false;initial-value:-100%}

:root{
  --void:#07070B;
  --obsidian:#0E0E16;
  --graphite:#1A1A24;
  --gunmetal:#2E2E3A;
  --pearl:#EDE9E0;
  --silver:#888894;
  --gold:#D4A447;
  --gold-glow:rgba(212,164,71,0.15);
  --gold-bright:rgba(212,164,71,0.35);
  --red:#B83A3A;

  --font-display:'Syne',system-ui,sans-serif;
  --font-body:'Outfit','Trebuchet MS',sans-serif;
  --teal:#0D3B3B;
  --teal-bright:#167272;
  --teal-glow:rgba(22,114,114,0.12);
  --font-mono:'Space Mono','Courier New',monospace;

  --liquid:cubic-bezier(0.22,0.68,0,1);
  --snap:cubic-bezier(0.16,1,0.3,1);

  --section-pad:clamp(80px,12vh,160px);
  --container:min(1200px,90vw);
}

html{scrollbar-width:thin;scrollbar-color:var(--gunmetal) var(--void)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:var(--gunmetal);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

body{font-family:var(--font-body);font-weight:300;color:var(--pearl);background:var(--void);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;text-wrap:balance;letter-spacing:-0.02em}
p{text-wrap:pretty;line-height:1.75}

/* ===== GRAIN OVERLAY ===== */
.grain{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;mix-blend-mode:overlay}

/* ===== CURSOR SPOTLIGHT (desktop) ===== */
.spotlight{position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;z-index:9997;background:radial-gradient(circle,rgba(212,164,71,0.06) 0%,transparent 70%);transform:translate(-50%,-50%);will-change:transform;opacity:0;transition:opacity 0.6s}
@media(pointer:fine){.spotlight{opacity:1}}

/* ===== ATMOSPHERE ORBS ===== */
.atmos{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:0;transition:opacity 1.8s var(--liquid)}
.atmos.vis{opacity:1}
.atmos--1{width:500px;height:500px;background:rgba(212,164,71,0.04);top:-100px;right:-150px}
.atmos--2{width:600px;height:600px;background:rgba(22,114,114,0.04);bottom:-200px;left:-200px}
.atmos--3{width:400px;height:400px;background:rgba(212,164,71,0.04);top:50%;right:-100px}

/* ===== NAVIGATION ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 0;transition:background 0.5s,padding 0.5s,backdrop-filter 0.5s}
.nav.scrolled{background:rgba(7,7,11,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:0.75rem 0;border-bottom:1px solid rgba(46,46,58,0.4)}
.nav__inner{max-width:var(--container);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
.nav__logo{font-family:var(--font-display);font-size:1.125rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;color:var(--pearl)}
.nav__logo em{color:var(--gold);font-style:normal}
.nav__links{display:flex;gap:2rem;align-items:center}
.nav__link{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver);transition:color 0.3s}
.nav__link:hover{color:var(--pearl)}
.nav__cta{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.65rem 1.5rem;border:1px solid var(--gold);color:var(--gold);border-radius:2px;transition:all 0.4s var(--liquid);position:relative;overflow:hidden}
.nav__cta::before{content:"";position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:right;transition:transform 0.5s var(--snap);z-index:-1}
.nav__cta:hover::before{transform:scaleX(1);transform-origin:left}
.nav__cta:hover{color:var(--void)}
.nav__burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;z-index:110}
.nav__burger span{display:block;width:24px;height:1.5px;background:var(--pearl);transition:all 0.4s var(--liquid)}
.nav__burger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.nav__burger.open span:nth-child(2){opacity:0}
.nav__burger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* ===== MOBILE MENU ===== */
.mob-menu{position:fixed;inset:0;z-index:105;background:var(--void);clip-path:circle(0% at calc(100% - 40px) 40px);transition:clip-path 0.6s var(--snap);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.mob-menu.open{clip-path:circle(150% at calc(100% - 40px) 40px)}
.mob-menu__link{font-family:var(--font-display);font-size:1.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--pearl);opacity:0;transform:translateY(20px);transition:all 0.4s var(--liquid)}
.mob-menu.open .mob-menu__link{opacity:1;transform:translateY(0)}
.mob-menu.open .mob-menu__link:nth-child(1){transition-delay:0.15s}
.mob-menu.open .mob-menu__link:nth-child(2){transition-delay:0.22s}
.mob-menu.open .mob-menu__link:nth-child(3){transition-delay:0.29s}
.mob-menu.open .mob-menu__link:nth-child(4){transition-delay:0.36s}
.mob-menu.open .mob-menu__link:nth-child(5){transition-delay:0.43s}
.mob-menu__phone{font-family:var(--font-mono);font-size:0.875rem;color:var(--gold);letter-spacing:0.1em;opacity:0;transition:opacity 0.4s 0.5s}
.mob-menu.open .mob-menu__phone{opacity:1}

/* ===== HERO ===== */
.hero{position:relative;min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--void)}
.hero-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}
.hero-bar{position:absolute;left:0;right:0;background:var(--void);z-index:11}
.hero-bar--top{top:0;height:50%}
.hero-bar--bottom{bottom:0;height:50%}
.hero-line{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:1px;background:var(--gold);z-index:12}
.hero-bg{position:absolute;inset:0;z-index:1}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center 40%;filter:grayscale(1) brightness(0.3) saturate(0.2);will-change:filter,transform}
.hero-content{position:relative;z-index:5;text-align:center;padding:0 1.5rem;max-width:900px;opacity:0}
.hero-headline{font-size:clamp(3.5rem,13vw,11rem);line-height:0.9;letter-spacing:-0.04em;color:var(--teal-bright);margin-bottom:1.5rem;font-weight:800;text-transform:uppercase;white-space:nowrap}
.hero-headline span{display:block}
.hero-sub{margin-bottom:0.5rem}
.hero-location{margin-bottom:2.5rem}
.mono-label{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver)}
.mono-label--sm{font-size:0.625rem;letter-spacing:0.22em}
.hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}

/* ===== BUTTONS ===== */
.btn{font-family:var(--font-mono);font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.9rem 2.25rem;border-radius:2px;cursor:pointer;transition:all 0.4s var(--liquid);position:relative;overflow:hidden;display:inline-block;border:none}
.btn--primary{background:var(--gold);color:var(--void)}
.btn--primary::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transform:translateX(var(--shimmer-x));animation:shimmerBtn 4s ease-in-out infinite;pointer-events:none}
.btn--primary:hover{box-shadow:0 0 30px var(--gold-glow),0 0 60px rgba(212,164,71,0.08)}
.btn--outline{background:transparent;color:var(--pearl);border:1px solid var(--gunmetal);transition:all 0.4s var(--liquid)}
.btn--outline:hover{border-color:var(--gold);color:var(--gold)}

/* ===== TRUST MARQUEE ===== */
.marquee-wrap{border-top:1px solid var(--gunmetal);border-bottom:1px solid var(--gunmetal);background:var(--obsidian);padding:0.9rem 0;overflow:hidden;position:relative}
.marquee-track{display:flex;width:max-content;gap:0}
.marquee-track--top{animation:marqueeScroll 50s linear infinite}
.marquee-track--bottom{animation:marqueeScroll 55s linear infinite reverse}
.marquee-item{font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--silver);white-space:nowrap;padding:0 1.5rem}
.marquee-diamond{color:var(--gold);font-size:0.5rem;padding:0 0.5rem}
.marquee-wrap:hover .marquee-track{animation-play-state:paused}
.marquee-row{overflow:hidden;padding:0.25rem 0}

/* ===== SECTION DEFAULTS ===== */
.section{position:relative;padding:var(--section-pad) 0}
.section__inner{max-width:var(--container);margin:0 auto;padding:0 1.5rem}
.section-label{font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:block}
.section-heading{font-size:clamp(2rem,4.5vw,3.5rem);line-height:1.05;letter-spacing:-0.03em;margin-bottom:1.5rem;font-weight:800;text-transform:uppercase}
.section-body{font-size:clamp(0.95rem,1.1vw,1.125rem);color:var(--silver);max-width:560px;line-height:1.75}

/* ===== LINE MASK REVEAL ===== */
.line-mask{overflow:hidden}
.line-mask span{display:block;transform:translateY(110%);transition:transform 0.9s var(--snap)}
.line-mask.vis span{transform:translateY(0)}
.line-mask.vis span:nth-child(2){transition-delay:0.1s}
.line-mask.vis span:nth-child(3){transition-delay:0.18s}

/* ===== SURFACE REVEAL ===== */
.surface-el{opacity:0;transform:translateY(24px) scale(0.985);filter:blur(4px);transition:all 0.8s var(--liquid)}
.surface-el.vis{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}

/* ===== PROBLEM SECTION ===== */
.problem{background:linear-gradient(180deg,var(--obsidian) 0%,var(--teal) 100%);overflow:visible}
.problem__grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.problem__sticky{position:sticky;top:15vh;aspect-ratio:1/1;border-radius:1rem;overflow:hidden;border:1px solid var(--gunmetal);background:var(--graphite)}
.problem__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.8s var(--liquid)}
.problem__img.active{opacity:1}
.problem__items{display:flex;flex-direction:column;gap:3rem;padding:8vh 0}
.problem__item{padding:2rem 0;border-top:1px solid var(--gunmetal)}
.problem__name{font-family:var(--font-display);font-size:1.25rem;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;color:var(--red);margin-bottom:0.75rem}
.problem__desc{color:var(--silver);line-height:1.7;margin-bottom:0.5rem;font-size:0.95rem}
.problem__stat{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gunmetal)}

/* ===== TRANSFORMATION ===== */
.transform{padding:var(--section-pad) 0}
.transform__frame{position:relative;width:100%;max-width:1100px;margin:0 auto;aspect-ratio:16/9;border-radius:1rem;overflow:hidden}
.transform__layer{position:absolute;inset:0}
.transform__layer img{width:100%;height:100%;object-fit:cover}
.transform__before img{filter:brightness(0.5) saturate(0.3) contrast(1.1)}
.transform__after{clip-path:circle(var(--circle-reveal) at 50% 50%);animation:circleGrow linear both;animation-timeline:view();animation-range:entry 10% cover 55%}
.transform__after img{filter:brightness(1.05) saturate(1.15) contrast(1.05)}
.transform__ring{position:absolute;inset:0;clip-path:circle(calc(var(--circle-reveal) + 2px) at 50% 50%);background:var(--gold);opacity:0.3;animation:circleGrow linear both;animation-timeline:view();animation-range:entry 10% cover 55%;pointer-events:none;z-index:2}
.transform__caption{text-align:center;margin-top:2rem;padding:0 1.5rem}
.transform__caption p{font-family:var(--font-display);font-style:italic;font-size:clamp(1.1rem,2vw,1.5rem);color:var(--silver)}

/* ===== SERVICES (STACKED CARDS) ===== */
.services{padding-bottom:0;overflow:visible}
.services__inner{max-width:var(--container);margin:0 auto;padding:0 1.5rem}
.svc-card{position:sticky;top:12vh;background:var(--graphite);border-radius:1.5rem 1.5rem 0 0;padding:clamp(2rem,4vw,3.5rem);min-height:45vh;border:1px solid var(--gunmetal);border-bottom:none;transition:transform 0.3s var(--liquid),filter 0.3s var(--liquid)}
.svc-card--flagship{background:linear-gradient(135deg,var(--obsidian),var(--teal));border-color:var(--teal-bright);box-shadow:0 0 40px var(--teal-glow),inset 0 0 40px rgba(42,168,154,0.04)}
.svc-card__step{font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:0.75rem}
.svc-card__name{font-family:var(--font-display);font-size:clamp(1.75rem,3.5vw,2.75rem);margin-bottom:1rem;font-weight:800;text-transform:uppercase;letter-spacing:-0.02em}
.svc-card__desc{color:var(--silver);max-width:500px;line-height:1.7;margin-bottom:1.5rem;font-size:0.95rem}
.svc-card__price{font-family:var(--font-mono);font-size:1.5rem;color:var(--gold);letter-spacing:-0.02em}
.svc-card__price span{font-size:0.75rem;color:var(--silver);letter-spacing:0.1em}
.svc-card__row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1.5rem}
.svc-card__img{width:40%;max-width:380px;border-radius:0.75rem;overflow:hidden;aspect-ratio:4/3}
.svc-card__img img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s var(--liquid)}
.svc-card:hover .svc-card__img img{transform:scale(1.04)}

/* ===== INTERSTITIAL ===== */
.interstitial{min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem 1.5rem;background:var(--teal)}
.interstitial__text{font-family:var(--font-display);font-weight:300;font-size:clamp(1.5rem,3.5vw,3rem);color:var(--pearl);max-width:600px;line-height:1.3;letter-spacing:0.01em;text-transform:none}

/* ===== CERAMIC DEEP DIVE ===== */
.ceramic{background:linear-gradient(180deg,var(--teal) 0%,var(--obsidian) 100%)}
.ceramic__process{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:4rem}
.process-card{background:var(--graphite);border-radius:1rem;padding:clamp(1.5rem,3vw,2.5rem);position:relative;overflow:hidden;border:1px solid var(--gunmetal)}
.process-card::before,.process-card::after{content:"";position:absolute;width:24px;height:24px;border-color:var(--teal-bright);border-style:solid}
.process-card::before{top:12px;left:12px;border-width:1px 0 0 1px}
.process-card::after{bottom:12px;right:12px;border-width:0 1px 1px 0}
.process-card__dot-grid{position:absolute;inset:0;opacity:0.04;background-image:radial-gradient(var(--silver) 1px,transparent 1px);background-size:20px 20px;pointer-events:none}
.process-card__num{font-family:var(--font-mono);font-size:clamp(3rem,5vw,4.5rem);color:var(--gold);opacity:0.12;position:absolute;top:0.5rem;right:1rem;line-height:1}
.process-card__name{font-family:var(--font-display);font-size:1.35rem;margin-bottom:0.75rem;position:relative}
.process-card__desc{color:var(--silver);font-size:0.875rem;line-height:1.7;position:relative}
.process-card__time{font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gunmetal);margin-top:1rem;position:relative}

/* Protection comparison */
.protection{max-width:700px;margin:0 auto}
.protection__row{margin-bottom:1.75rem}
.protection__label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.5rem}
.protection__name{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver)}
.protection__years{font-family:var(--font-mono);font-size:0.6875rem;color:var(--gunmetal)}
.protection__bar{height:4px;background:var(--gunmetal);border-radius:2px;overflow:hidden}
.protection__fill{height:100%;border-radius:2px;transform-origin:left;background:var(--silver)}
.protection__fill--wax{width:12%;animation:barGrow linear both;animation-timeline:view();animation-range:entry 20% entry 70%}
.protection__fill--seal{width:28%;animation:barGrow linear both;animation-timeline:view();animation-range:entry 25% entry 75%}
.protection__fill--ceramic{width:100%;background:linear-gradient(90deg,var(--teal-bright),var(--gold));box-shadow:0 0 12px var(--gold-glow);animation:barGrow linear both;animation-timeline:view();animation-range:entry 30% entry 80%}

/* ===== WHY LUIS ===== */
.why{background:var(--void);overflow:visible}
.why__grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.why__image{position:sticky;top:15vh;border-radius:1rem;overflow:hidden;aspect-ratio:3/4}
.why__image img{width:100%;height:100%;object-fit:cover}
.why__content{padding:4vh 0}
.why__stats{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:3rem}
.stat{text-align:left}
.stat__number{font-family:var(--font-mono);font-size:clamp(2.5rem,5vw,4rem);color:var(--pearl);letter-spacing:-0.03em;line-height:1}
.stat__label{font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver);margin-top:0.25rem}
.stat--accent .stat__number{color:var(--gold)}
.why__story{margin-bottom:2.5rem}
.why__story p{color:var(--silver);line-height:1.8;margin-bottom:1rem}
.why__list{list-style:none;display:flex;flex-direction:column;gap:0.75rem}
.why__list li{font-size:0.9rem;color:var(--silver);padding-left:1.5rem;position:relative}
.why__list li::before{content:"✓";position:absolute;left:0;color:var(--gold);font-weight:700}

/* ===== REVIEWS ===== */
.reviews{background:linear-gradient(180deg,var(--obsidian) 0%,rgba(26,63,63,0.3) 100%)}
.reviews__cards{display:flex;justify-content:center;gap:0;position:relative;perspective:1000px;min-height:340px;max-width:900px;margin:0 auto}
.rev-card{background:var(--graphite);border:1px solid var(--gunmetal);border-radius:1rem;padding:2rem;width:320px;position:absolute;transition:all 0.5s var(--liquid);cursor:default;transform-style:preserve-3d}
.rev-card:nth-child(1){z-index:3;transform:translateZ(0) rotate(0deg);left:calc(50% - 160px)}
.rev-card:nth-child(2){z-index:2;transform:translateZ(-20px) rotate(-2deg);left:calc(50% - 280px);top:20px}
.rev-card:nth-child(3){z-index:1;transform:translateZ(-40px) rotate(2deg);left:calc(50% - 40px);top:20px}
